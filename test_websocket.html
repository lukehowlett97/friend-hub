<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test - Friend Hub Chat</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        #messages { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
        .message { margin-bottom: 5px; padding: 5px; border-left: 3px solid #007bff; }
        .system { border-left-color: #28a745; background-color: #f8f9fa; }
        .error { border-left-color: #dc3545; background-color: #f8d7da; }
        input, button { margin: 5px; padding: 8px; }
        #connectionStatus { font-weight: bold; margin-bottom: 10px; }
        .connected { color: green; }
        .disconnected { color: red; }
    </style>
</head>
<body>
    <h1>Friend Hub Chat - WebSocket Test</h1>
    
    <div id="connectionStatus" class="disconnected">Status: Disconnected</div>
    
    <div>
        <input type="text" id="nicknameInput" placeholder="Enter nickname" value="TestUser">
        <button onclick="connect()">Connect</button>
        <button onclick="disconnect()">Disconnect</button>
    </div>
    
    <div id="messages"></div>
    
    <div>
        <input type="text" id="messageInput" placeholder="Type a message..." disabled>
        <button onclick="sendMessage()" disabled id="sendBtn">Send Message</button>
        <button onclick="ping()" disabled id="pingBtn">Ping</button>
    </div>

    <script>
        let ws = null;
        let sessionId = null;
        let nickname = null;

        function updateStatus(status, isConnected) {
            const statusEl = document.getElementById('connectionStatus');
            statusEl.textContent = `Status: ${status}`;
            statusEl.className = isConnected ? 'connected' : 'disconnected';
            
            // Enable/disable controls
            document.getElementById('messageInput').disabled = !isConnected;
            document.getElementById('sendBtn').disabled = !isConnected;
            document.getElementById('pingBtn').disabled = !isConnected;
        }

        function addMessage(data, type = 'message') {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            
            if (typeof data === 'string') {
                div.innerHTML = `<strong>${new Date().toLocaleTimeString()}</strong>: ${data}`;
            } else {
                div.innerHTML = `<strong>${new Date().toLocaleTimeString()}</strong>: <pre>${JSON.stringify(data, null, 2)}</pre>`;
            }
            
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        async function createSession() {
            try {
                const response = await fetch('http://localhost:8000/api/session', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ nickname: nickname })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                sessionId = data.session_id;
                addMessage(`Session created: ${sessionId}`, 'system');
                return sessionId;
            } catch (error) {
                addMessage(`Error creating session: ${error.message}`, 'error');
                return null;
            }
        }

        async function connect() {
            nickname = document.getElementById('nicknameInput').value.trim();
            if (!nickname) {
                alert('Please enter a nickname');
                return;
            }

            if (ws && ws.readyState === WebSocket.OPEN) {
                addMessage('Already connected!', 'system');
                return;
            }

            updateStatus('Connecting...', false);
            
            // Generate a simple session ID for testing (bypass session creation for now)
            sessionId = 'test-' + Math.random().toString(36).substr(2, 9);
            
            // Connect to WebSocket with session ID
            ws = new WebSocket(`ws://localhost:8000/ws/${sessionId}`);

            ws.onopen = function(event) {
                updateStatus(`Connected as ${nickname}`, true);
                addMessage('Connected to chat server', 'system');
            };

            ws.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    console.log('Received:', data);
                    
                    if (data.type === 'connection') {
                        addMessage(`Connection confirmed: ${data.session_id}`, 'system');
                    } else if (data.type === 'message') {
                        const isMe = data.session_id === sessionId;
                        const displayName = isMe ? 'Me' : data.session_id;
                        addMessage(`${displayName}: ${data.content}`);
                    } else if (data.type === 'pong') {
                        addMessage('Pong received', 'system');
                    } else if (data.type === 'user_disconnected') {
                        addMessage(`User ${data.session_id} disconnected`, 'system');
                    } else {
                        addMessage(data);
                    }
                } catch (error) {
                    addMessage(`Error parsing message: ${error.message}`, 'error');
                }
            };

            ws.onclose = function(event) {
                updateStatus('Disconnected', false);
                addMessage('WebSocket connection closed', 'system');
                ws = null;
            };

            ws.onerror = function(error) {
                updateStatus('Connection Error', false);
                addMessage('WebSocket error occurred', 'error');
                console.error('WebSocket error:', error);
            };
        }

        function disconnect() {
            if (ws) {
                ws.close();
            }
        }

        function sendMessage() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addMessage('Not connected!', 'error');
                return;
            }

            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            
            if (!content) {
                return;
            }

            const message = {
                type: "message",
                content: content
            };

            ws.send(JSON.stringify(message));
            input.value = '';
            
            // Don't add locally - let the broadcast handle it
        }

        function ping() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addMessage('Not connected!', 'error');
                return;
            }

            ws.send(JSON.stringify({ type: "ping" }));
            addMessage('Ping sent', 'system');
        }

        // Allow Enter key to send message
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Allow Enter key to connect
        document.getElementById('nicknameInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                connect();
            }
        });
    </script>
</body>
</html>
